<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Contato</title>

    <!-- CSS -->
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

<!-- MENU -->

<header>
    <h1>Contato</h1>

    <a href="index.html">Início</a>
        <a href="portifolio/sobre.html">Sobre Mim</a>
        <a href="portifolio/formacao.html">Formação</a>
        <a href="portifolio/portfolio.html">Portfólio</a>
        <a href="portifolio/contato.html">Contato</a>
    </nav>
</header>

<!-- SEÇÃO CONTATO -->

<section id="contato">

    <h2>Contato</h2>

    <form id="contactForm">

        <label for="name">Nome:</label>
        <input type="text" id="name" placeholder="Digite seu nome">

        <label for="email">E-mail:</label>
        <input type="text" id="email" placeholder="Digite seu e-mail">

        <label for="message">Mensagem:</label>
        <textarea id="message" placeholder="Escreva sua mensagem"></textarea>

        <button type="submit">Enviar</button>

        <p id="successMessage" style="display:none; color:green; margin-top:10px;">
            Mensagem enviada com sucesso!
        </p>

    </form>

</section>

<!-- JAVASCRIPT -->

<script>
window.onload = function () {

    const form = document.getElementById("contactForm");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", function (event) {
        event.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!name || !email || !message) {
            alert("⚠️ Preencha todos os campos!");
            return;
        }

        if (!emailPattern.test(email)) {
            alert("⚠️ E-mail inválido!");
            return;
        }

        successMessage.style.display = "block";
        form.reset();

        setTimeout(() => {
            successMessage.style.display = "none";
        }, 3000);
    });

};
</script>

</body>
</html>
